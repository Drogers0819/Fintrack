services:
  - type: web
    name: claro
    runtime: python
    buildCommand: pip install -r Fintrack/requirements.txt
    startCommand: cd Fintrack && gunicorn app:create_app() --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production