{% extends "base.html" %}
{% block title %}Register — FinTrack{% endblock %}

{% block auth_content %}
<div class="auth-container">
    <div class="auth-header">
        <div class="sidebar-logo" style="font-size: 2.4rem; margin-bottom: 16px;">Claro</div>
        <div class="gold-divider"></div>
        <p style="color: var(--text-secondary); font-size: 0.85rem; font-style: italic;">
            Begin your financial journey
        </p>
    </div>

    <div class="glass-card">
        <form method="POST" action="{{ url_for('pages.register') }}">
            <div class="form-group">
                <label class="form-label">Your name</label>
                <input type="text" name="name" class="form-input" placeholder="e.g. Sarah" required>
            </div>

            <div class="form-group">
                <label class="form-label">Email address</label>
                <input type="email" name="email" class="form-input" placeholder="e.g. sarah@example.com" required>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" placeholder="Minimum 8 characters" required minlength="8">
            </div>

            <button type="submit" class="btn-gold" style="margin-top: 8px;">Create Account</button>
        </form>
    </div>

    <div class="auth-footer">
        Already have an account? <a href="{{ url_for('pages.login') }}">Sign in</a>
    </div>
</div>
{% endblock %}
