{% extends "base.html" %}
{% block title %}Sign In — FinTrack{% endblock %}

{% block auth_content %}
<div class="auth-container">
    <div class="auth-header">
        <div class="sidebar-logo" style="font-size: 2.4rem; margin-bottom: 16px;">Claro</div>
        <div class="gold-divider"></div>
        <p style="color: var(--text-secondary); font-size: 0.85rem; font-style: italic;">
            Welcome back
        </p>
    </div>

    <div class="glass-card">
        <form method="POST" action="{{ url_for('pages.login') }}">
            <div class="form-group">
                <label class="form-label">Email address</label>
                <input type="email" name="email" class="form-input" placeholder="Your email" required>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" placeholder="Your password" required>
            </div>

            <button type="submit" class="btn-gold" style="margin-top: 8px;">Enter the Vault</button>
        </form>
    </div>

    <div class="auth-footer">
        New here? <a href="{{ url_for('pages.register') }}">Create an account</a>
    </div>
</div>
{% endblock %}
