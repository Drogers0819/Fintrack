{% extends "base.html" %}
{% block title %}Sign In — Claro{% endblock %}

{% block auth_content %}
<div style="max-width: 400px; margin: 60px auto; padding: 0 20px;">
    <div style="text-align: center; margin-bottom: 32px;">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Claro"
             style="width: 180px; height: auto; margin-bottom: 8px;">
    </div>

    <div class="glass-card">
        <form method="POST" action="{{ url_for('pages.login') }}">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-input" placeholder="you@email.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" placeholder="Your password" required>
            </div>
            <button type="submit" class="btn-gold" style="width: 100%; margin-top: 8px;">Sign in</button>
        </form>
        <p style="text-align: center; margin-top: 16px; font-size: 0.8rem; color: var(--text-secondary);">
            New here? <a href="{{ url_for('pages.register') }}">Create an account</a>
        </p>
    </div>
</div>
{% endblock %}
