{% extends "base.html" %}
{% block title %}Sign In – Claro{% endblock %}

{% block auth_content %}
<div style="max-width: 400px; margin: 60px auto; padding: 0 20px;">
    <div style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 32px;">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="" style="height: 28px; width: auto; margin-right: -17px;">
        <span style="font-family: var(--font-sans); font-size: 1.3rem; font-weight: 600; color: var(--text-primary); letter-spacing: -0.01em; line-height: 1;">Claro</span>
    </div>

    <div class="glass-card">
        <form method="POST" action="{{ url_for('pages.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label class="form-label" for="login-email">Email</label>
                <input type="email" id="login-email" name="email" class="form-input" placeholder="you@email.com" value="{{ prefill_email or '' }}" required oninvalid="this.setCustomValidity('Enter your email address')" oninput="this.setCustomValidity('')">
            </div>
            <div class="form-group">
                <label class="form-label" for="login-password">Password</label>
                <div class="password-field">
                    <input type="password" id="login-password" name="password" class="form-input" placeholder="Your password" required oninvalid="this.setCustomValidity('Enter your password')" oninput="this.setCustomValidity('')">
                    <button type="button" class="password-toggle" aria-label="Show password" onclick="togglePassword('login-password', this)">
                        <svg class="eye-on" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="eye-off" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-primary btn-full">Sign in</button>
        </form>
        <p style="text-align: center; margin-top: 16px; font-size: 0.8rem; color: var(--text-secondary);">
            New here? <a href="{{ url_for('pages.register') }}">Create an account</a>
        </p>
    </div>
</div>
{% endblock %}
