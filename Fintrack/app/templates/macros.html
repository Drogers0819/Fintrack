{% macro whisper_card(whisper) %}
<div class="gold-card" style="margin-bottom: 24px;">
    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
        <span class="ai-pulse"></span>
        <span class="metric-label" style="margin-bottom: 0; color: var(--roman-gold);">What you need to know</span>
    </div>
    <p style="font-size: 0.9rem; color: var(--text-secondary); line-height: 1.7;">"{{ whisper }}"</p>
</div>
{% endmacro %}
