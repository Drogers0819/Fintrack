{% macro whisper_card(whisper) %}
<div class="gold-card" style="margin-bottom: 24px;">
    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
        <span class="ai-pulse"></span>
        <span style="font-size: 0.65rem; color: var(--roman-gold); text-transform: uppercase; letter-spacing: 0.06em;">Claro</span>
    </div>
    <p style="font-size: 0.9rem; color: var(--text-secondary); line-height: 1.7; font-style: italic;">"{{ whisper }}"</p>
</div>
{% endmacro %}
