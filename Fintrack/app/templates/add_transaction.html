{% extends "base.html" %}
{% block title %}Add Transaction – Claro{% endblock %}

{% block header_content %}
<nav class="app-breadcrumb" aria-label="Breadcrumb">
    <a href="{{ url_for('pages.my_money') }}">Money</a>
    <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    <span>Add transaction</span>
</nav>
{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Add a transaction</h1>
</div>

<div style="max-width: 560px;">
    <form method="POST" action="{{ url_for('pages.add_transaction') }}">
        <div class="grid-2">
            <div class="form-group">
                <label class="form-label">Amount (£)</label>
                <input type="number" name="amount" class="form-input" step="0.01" min="0.01" placeholder="0.00" required
                    oninvalid="this.setCustomValidity('Please enter an amount greater than 0')"
                    oninput="this.setCustomValidity('')">
            </div>
            <div class="form-group">
                <label class="form-label">Type</label>
                <select name="type" class="form-select" required>
                    <option value="expense">Expense</option>
                    <option value="income">Income</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Description</label>
            <input type="text" name="description" class="form-input" placeholder="e.g. Tesco weekly shop" required
                oninvalid="this.setCustomValidity('Please add a short description for this transaction')"
                oninput="this.setCustomValidity('')">
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label class="form-label">Category</label>
                <select name="category_id" class="form-select">
                    {% for cat in categories %}
                    <option value="{{ cat.id }}" {% if cat.name == "Other" %}selected{% endif %}>
                        {{ cat.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Date</label>
                <input type="text" name="date" class="form-input date-picker" placeholder="Select date" required>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Merchant (optional)</label>
            <input type="text" name="merchant" class="form-input" placeholder="e.g. Tesco, Netflix, Uber">
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 4px;">
            <button type="submit" class="btn-primary btn-full">Record transaction</button>
            <a href="{{ url_for('pages.my_money') }}" style="text-align: center; font-size: 0.82rem; color: var(--text-tertiary); text-decoration: none;">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
